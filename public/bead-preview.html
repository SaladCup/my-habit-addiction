<!doctype html>
<!-- Bead material preview — renders the 7 bead types with the EXACT material
     params from src/components/BeadJar3D.jsx (marble glass + rainbow + gold).
     Pure three.js, ONE synchronous frame (no rAF), so it renders anywhere.
     Open: http://localhost:5175/bead-preview.html -->
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; background: linear-gradient(180deg, #F6E3F1 0%, #EFE2F7 55%, #E7DBF3 100%);
         font-family: -apple-system, sans-serif; }
  #wrap { width: 1240px; margin: 0 auto; }
  canvas { display: block; }
  #labels { display: flex; width: 1240px; margin: -6px auto 0; }
  #labels div { flex: 1; text-align: center; color: #7B5EA7; font-size: 15px; font-weight: 600; }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="wrap"></div>
<div id="labels">
  <div>Rose Quartz</div><div>Orchid</div><div>Sky</div><div>Mint</div>
  <div>Coral</div><div>Rainbow 🌈</div><div>Gold</div>
</div>
<script type="module">
import * as THREE from 'three'
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js'

// ——— copied verbatim from BeadJar3D.jsx ———
const GOLD_HEX = '#F5C04A'
function deepen(hex) {
  const c = new THREE.Color(hex)
  const hsl = {}
  c.getHSL(hsl)
  c.setHSL(hsl.h, Math.min(1, hsl.s * 1.25 + 0.04), Math.max(0.3, hsl.l * 0.85))
  return c
}
function rainbowTexture() {
  const c = document.createElement('canvas')
  c.width = c.height = 64
  const g = c.getContext('2d')
  // near-vertical: sphere UV shows the full v range face-on (u wraps behind)
  const grad = g.createLinearGradient(14, 0, 50, 64)
  const stops = ['#FF8FB5', '#FFC183', '#FFF27E', '#86E8A8', '#7FC4FF', '#BC9BFF', '#FF8FD6']
  stops.forEach((s, i) => grad.addColorStop(i / (stops.length - 1), s))
  g.fillStyle = grad
  g.fillRect(0, 0, 64, 64)
  const tex = new THREE.CanvasTexture(c)
  tex.colorSpace = THREE.SRGBColorSpace
  return tex
}
const MARBLE = {
  metalness: 0, roughness: 0.05,
  transmission: 0.55, thickness: 0.09, ior: 1.45,
  iridescence: 0.45, iridescenceIOR: 1.3, iridescenceThicknessRange: [120, 400],
  clearcoat: 1, clearcoatRoughness: 0.03, envMapIntensity: 0.8,
}
const SLOTS = [
  ['#FBB3CF', 'rose'], ['#E4A8EB', 'orchid'], ['#A9D2F5', 'sky'],
  ['#B2EAD8', 'mint'], ['#FCB8A3', 'coral'],
]
// ————————————————————————————————————————

const W = 1240, H = 320
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true })
renderer.setSize(W, H)
renderer.setPixelRatio(2)
document.getElementById('wrap').appendChild(renderer.domElement)

const scene = new THREE.Scene()
const pmrem = new THREE.PMREMGenerator(renderer)
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture

const camera = new THREE.PerspectiveCamera(26, W / H, 0.1, 100)
camera.position.set(0, 0.4, 6.6)
camera.lookAt(0, -0.05, 0)

// same lights as the app jar
scene.add(new THREE.AmbientLight(0xffffff, 0.45))
const d1 = new THREE.DirectionalLight(0xffffff, 1.7); d1.position.set(2.5, 6, 4); scene.add(d1)
const d2 = new THREE.DirectionalLight(0xffffff, 0.5); d2.position.set(-3, 2, 2); scene.add(d2)

// soft floor so the beads sit on something
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 12),
  new THREE.MeshStandardMaterial({ color: '#F3E4F2', roughness: 0.55 })
)
floor.rotation.x = -Math.PI / 2
floor.position.y = -0.52
scene.add(floor)

const geo = new THREE.SphereGeometry(0.5, 48, 32)
const mats = [
  ...SLOTS.map(([hex]) => new THREE.MeshPhysicalMaterial({ ...MARBLE, color: deepen(hex) })),
  new THREE.MeshPhysicalMaterial({ ...MARBLE, color: '#FFFFFF', map: rainbowTexture(), iridescence: 0.65 }),
  new THREE.MeshPhysicalMaterial({ color: GOLD_HEX, metalness: 0.8, roughness: 0.16, clearcoat: 1, clearcoatRoughness: 0.06, envMapIntensity: 1.1 }),
]
mats.forEach((m, i) => {
  const s = new THREE.Mesh(geo, m)
  s.position.set((i - 3) * 1.18, 0, 0)
  scene.add(s)
})

renderer.render(scene, camera)   // ONE static frame — no animation loop
document.title = 'beads rendered'
</script>
</body>
</html>
