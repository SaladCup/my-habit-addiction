<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brainrot locked</title>
  <link rel="stylesheet" href="blocked.css" />
</head>
<body>
  <div class="card">
    <div class="lock">🔒</div>
    <h1>Brainrot locked</h1>
    <p class="site">You tried to open <b id="site">this site</b>.</p>
    <p class="msg" id="status">You’re out of free time. Earn more by doing a habit — or Break Glass in the app if you really need in.</p>

    <div class="coins" id="coins">checking…</div>

    <div class="actions">
      <button id="openapp" class="btn primary">✅ Open My Habit Addiction</button>
      <a id="goback" class="btn ghost disabled" href="#">↩︎ Go back</a>
    </div>

    <p class="hint" id="hint">Do a habit to bank more time, then come back here and hit “Go back”.</p>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
