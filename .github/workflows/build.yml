# Builds the Mac + Windows installers in the cloud — this is how you get a
# Windows .exe without owning a Windows PC.
#
# Two ways it runs:
#  • Push a version tag like `v0.1.0`  -> builds BOTH, then attaches the
#    installers to a GitHub Release (a download page you can share).
#  • Click "Run workflow" in the Actions tab -> builds BOTH, downloadable from
#    that run's page (good for test builds without making a release).
name: Build desktop installers

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write          # needed to publish the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Import the STABLE self-signed certificate (macOS) so every build shares one
      # signing identity — that's what lets macOS keep the Accessibility (TCC) grant
      # across updates. afterPack.cjs signs with SIGN_IDENTITY when it's set; if the
      # secret is missing it falls back to ad-hoc (no worse than before).
      - name: Set up signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "$CSC_LINK" ]; then echo "No CSC_LINK secret — building ad-hoc."; exit 0; fi
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          /usr/bin/openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -nokeys -clcerts -out "$RUNNER_TEMP/cert.pem" -passin "pass:$CSC_KEY_PASSWORD" 2>/dev/null \
            || openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -nokeys -clcerts -out "$RUNNER_TEMP/cert.pem" -passin "pass:$CSC_KEY_PASSWORD" -legacy
          KC="$RUNNER_TEMP/build.keychain"
          security create-keychain -p actions "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p actions "$KC"
          security import "$RUNNER_TEMP/cert.p12" -P "$CSC_KEY_PASSWORD" -A -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KC" >/dev/null
          security add-trusted-cert -p codeSign -k "$KC" "$RUNNER_TEMP/cert.pem"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/["]//g')
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/cert.pem"
          echo "SIGN_IDENTITY=My Habit Addiction Self-Signed" >> "$GITHUB_ENV"

      - name: Build installer
        run: npm run electron:build

      # Always keep the installers as downloadable artifacts on the run.
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.zip
          if-no-files-found: ignore

      # On a version tag, publish the installers to the PUBLIC releases repo
      # (the code repo stays private). That public release page is what people
      # download from, and what the in-app auto-updater checks. Needs a token
      # with write access to that repo, stored as the RELEASES_TOKEN secret.
      - name: Publish to the public releases repo
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          repository: SaladCup/my-habit-addiction-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.dmg
            release/*.exe
            release/*.zip
