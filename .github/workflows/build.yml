# Builds the Mac + Windows installers in the cloud — this is how you get a
# Windows .exe without owning a Windows PC.
#
# Two ways it runs:
#  • Push a version tag like `v0.1.0`  -> builds BOTH, then attaches the
#    installers to a GitHub Release (a download page you can share).
#  • Click "Run workflow" in the Actions tab -> builds BOTH, downloadable from
#    that run's page (good for test builds without making a release).
name: Build desktop installers

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write          # needed to publish the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build installer
        run: npm run electron:build

      # Always keep the installers as downloadable artifacts on the run.
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.zip
          if-no-files-found: ignore

      # On a version tag, also publish them to a shareable Release page.
      - name: Publish to Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.exe
            release/*.zip
