# Builds the Mac + Windows installers in the cloud — this is how you get a
# Windows .exe without owning a Windows PC.
#
# Two ways it runs:
#  • Push a version tag like `v0.1.0`  -> builds BOTH, then attaches the
#    installers to a GitHub Release (a download page you can share).
#  • Click "Run workflow" in the Actions tab -> builds BOTH, downloadable from
#    that run's page (good for test builds without making a release).
name: Build desktop installers

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write          # needed to publish the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Third-party Actions are pinned to a full commit SHA (not a mutable @vN tag):
      # whoever controls a tag could repoint it at malicious code, and these jobs hold
      # the signing cert + RELEASES_TOKEN. The trailing `# vX.Y.Z` keeps it readable and
      # lets Dependabot bump the SHA. (Verified against GitHub's API on 2026-06-22.)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Import the STABLE self-signed certificate (macOS) so every build shares one
      # signing identity — that's what lets macOS keep the Accessibility (TCC) grant
      # across updates. afterPack.cjs signs with SIGN_IDENTITY when it's set; if the
      # secret is missing it falls back to ad-hoc (no worse than before).
      - name: Set up signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "$CSC_LINK" ]; then echo "No CSC_LINK secret — building ad-hoc."; exit 0; fi
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          KC="$RUNNER_TEMP/build.keychain"
          security create-keychain -p actions "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p actions "$KC"
          security import "$RUNNER_TEMP/cert.p12" -P "$CSC_KEY_PASSWORD" -A -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KC" >/dev/null
          # Put the keychain on the search list so codesign can find the identity. We do
          # NOT add-trusted-cert: it prompts for authorization and hangs on a headless
          # runner, and signing (vs verifying) doesn't require the cert to be trusted.
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/["]//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "SIGN_IDENTITY=My Habit Addiction Self-Signed" >> "$GITHUB_ENV"

      - name: Build installer
        run: npm run electron:build

      # Sign the updater-fetched artifacts (the -mac.zip / .exe / .dmg) with the
      # Ed25519 private key held ONLY as the UPDATE_SIGNING_KEY secret. Writes a
      # detached <artifact>.sig next to each; the app verifies these before any
      # install (refuses anything not signed by Lauren's key). Each matrix runner
      # signs what it built. No-ops cleanly if the secret is absent. The public key
      # is passed so the script self-verifies and fails the build on a key mismatch.
      - name: Sign updater artifacts
        env:
          UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
          UPDATE_PUBLIC_KEY_PEM: |
            -----BEGIN PUBLIC KEY-----
            MCowBQYDK2VwAyEADaUVjYMYxlN5HDJGdewWMSwlzm3JS9scLJtfExB3iL4=
            -----END PUBLIC KEY-----
        run: node scripts/sign-artifacts.cjs release

      # Keep installers as run artifacts ONLY for manual test builds (workflow_dispatch).
      # On a version tag the Release below is the real deliverable, so we SKIP this —
      # otherwise the GitHub Actions artifact-storage quota (a separate, easily-exhausted
      # limit) can fail the job and block the release publish, which is exactly what hit
      # v0.1.38. continue-on-error means even a test build's quota hit never fails the job.
      - name: Upload run artifacts (test builds only)
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.zip
            release/*.sig
          if-no-files-found: ignore

      # On a version tag, publish the installers to the PUBLIC releases repo
      # (the code repo stays private). That public release page is what people
      # download from, and what the in-app auto-updater checks. Needs a token
      # with write access to that repo, stored as the RELEASES_TOKEN secret.
      - name: Publish to the public releases repo
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          repository: SaladCup/my-habit-addiction-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.dmg
            release/*.exe
            release/*.zip
            release/*.sig
